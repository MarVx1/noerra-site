name: Python package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run static checks
        run: |
          python -m py_compile adaptation/adapter.py adaptation/editorial.py adaptation/cluster.py adaptation/utils.py database/db.py bot/bot.py scheduler/scheduler.py
      - name: Run unit tests
        env:
          BOT_TOKEN: "123456:test"
          ADMIN_CHAT_ID: "1"
          CHANNEL_ID: "@test"
          TELEGRAPH_TOKEN: "test"
          DATABASE_PATH: "test_noerra.db"
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
